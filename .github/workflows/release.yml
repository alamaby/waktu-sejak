name: Release Android APK

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build split-per-ABI APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          BUILD_NAME="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "build_name=${BUILD_NAME}" >> "$GITHUB_OUTPUT"
          echo "build_number=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "${RUNNER_TEMP}/upload-keystore.jks"
          echo "KEYSTORE_PATH=${RUNNER_TEMP}/upload-keystore.jks" >> "$GITHUB_ENV"

      - name: Flutter pub get
        run: flutter pub get

      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build split-per-ABI release APKs
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          flutter build apk \
            --release \
            --split-per-abi \
            --build-name="${{ steps.version.outputs.build_name }}" \
            --build-number="${{ steps.version.outputs.build_number }}"

      - name: Rename APKs
        id: rename
        run: |
          OUT_DIR="build/app/outputs/flutter-apk"
          TAG="${{ steps.version.outputs.tag }}"
          mkdir -p dist
          for abi in armeabi-v7a arm64-v8a x86_64; do
            src="${OUT_DIR}/app-${abi}-release.apk"
            dst="dist/waktu-sejak-${TAG}-${abi}.apk"
            mv "$src" "$dst"
          done
          ls -la dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/waktu-sejak-${{ steps.version.outputs.tag }}-armeabi-v7a.apk
            dist/waktu-sejak-${{ steps.version.outputs.tag }}-arm64-v8a.apk
            dist/waktu-sejak-${{ steps.version.outputs.tag }}-x86_64.apk
