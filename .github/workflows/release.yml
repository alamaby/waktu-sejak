name: Release Android APK + AAB

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build split-per-ABI APKs and AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          BUILD_NAME="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "build_name=${BUILD_NAME}" >> "$GITHUB_OUTPUT"
          echo "build_number=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "${RUNNER_TEMP}/upload-keystore.jks"
          echo "KEYSTORE_PATH=${RUNNER_TEMP}/upload-keystore.jks" >> "$GITHUB_ENV"

      - name: Sync pubspec version with tag
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.build_name }}+${{ steps.version.outputs.build_number }}/" pubspec.yaml
          grep "^version:" pubspec.yaml

      - name: Flutter pub get
        run: flutter pub get

      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build split-per-ABI release APKs
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          flutter build apk \
            --release \
            --split-per-abi \
            --build-name="${{ steps.version.outputs.build_name }}" \
            --build-number="${{ steps.version.outputs.build_number }}"

      - name: Build release AAB (for Play Store)
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          flutter build appbundle \
            --release \
            --build-name="${{ steps.version.outputs.build_name }}" \
            --build-number="${{ steps.version.outputs.build_number }}"

      - name: Rename artifacts
        id: rename
        run: |
          APK_DIR="build/app/outputs/flutter-apk"
          AAB_DIR="build/app/outputs/bundle/release"
          TAG="${{ steps.version.outputs.tag }}"
          mkdir -p dist
          for abi in armeabi-v7a arm64-v8a x86_64; do
            src="${APK_DIR}/app-${abi}-release.apk"
            dst="dist/waktu-sejak-${TAG}-${abi}.apk"
            mv "$src" "$dst"
          done
          mv "${AAB_DIR}/app-release.aab" "dist/waktu-sejak-${TAG}.aab"
          ls -la dist

      - name: Verify AAB signing (must NOT be debug key)
        run: |
          AAB="dist/waktu-sejak-${{ steps.version.outputs.tag }}.aab"
          jarsigner -verify -verbose -certs "$AAB" | tee /tmp/jarsigner-aab.log
          if grep -qi "Android Debug" /tmp/jarsigner-aab.log; then
            echo "::error::AAB is signed with debug key — check KEYSTORE_BASE64 / keystore wiring."
            exit 1
          fi

      - name: Validate Play upload credentials
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" ]; then
            echo "::error::Missing secret GOOGLE_PLAY_SERVICE_ACCOUNT_JSON. Add the Google Play service account JSON in GitHub Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Upload AAB to Play internal testing
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.alamaby.waktu_sejak
          releaseFiles: dist/waktu-sejak-${{ steps.version.outputs.tag }}.aab
          track: internal
          status: completed

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/waktu-sejak-${{ steps.version.outputs.tag }}-armeabi-v7a.apk
            dist/waktu-sejak-${{ steps.version.outputs.tag }}-arm64-v8a.apk
            dist/waktu-sejak-${{ steps.version.outputs.tag }}-x86_64.apk
            dist/waktu-sejak-${{ steps.version.outputs.tag }}.aab
